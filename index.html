  .section-title { font-family: 'Playfair Display', serif; font-size: clamp(26px,4vw,36px); font-weight: 700; color: #3d2b1f; line-height: 1.2; }

  @keyframes spin { to { transform: rotate(360deg); } }
  .review-card { background: #fffaf4; border: 1px solid #e0c9a8; border-radius: 16px; padding: 24px 22px; display: flex; flex-direction: column; gap: 10px; transition: transform 0.22s ease, box-shadow 0.22s ease; }

<script type="text/babel">
const { useState, useEffect } = React;

// ── CONFIG ────────────────────────────────────────────────
const OWNER_EMAIL = "spinesnscribbles@gmail.com"; // change this

const BADGE_COLORS = {
  "Bestseller":   "#7c5c3e",
  "Staff Pick":   "#3e6b3e",
  "New Arrival":  "#3e5c7c",
  "Award Winner": "#7c3e5c",
  "New":          "#3e7c6c",
  "Handmade":     "#7c6c3e",
  "✨ Mystery":   "#5c3e7c",
};

const CATEGORIES = [
  { key:"all",       label:"All"            },
  { key:"books",     label:"Books"          },
  { key:"bookmarks", label:"Bookmarks"      },
  { key:"diaries",   label:"Diaries"        },
  { key:"misc",      label:"Misc"           },
  { key:"mystery",   label:"Mystery Box ✨" },
];

// ── PRODUCT IMAGE HELPER ──────────────────────────────────
function ProductImage({ src, alt, style={} }) {
  const [errored, setErrored] = useState(false);
  if (errored) return (
    <div style={{ width:"100%", height:280, display:"flex", alignItems:"center", justifyContent:"center", background:"#f5e6d0", fontSize:52 }}>📚</div>
  );
  return (
    <img src={src} alt={alt}
      onError={() => setErrored(true)}
      style={{ width:"100%", height:"auto", display:"block", ...style }}
    />
  );
}

// ── ROOT APP ──────────────────────────────────────────────
function App() {
  const [products, setProducts]     = useState([]);
  const [reviews, setReviews]       = useState([]);
  const [faqs, setFaqs]             = useState([]);
  const [coupons, setCoupons]       = useState({});
  const [loading, setLoading]       = useState(true);
  const [page, setPage]             = useState("home");
  const [category, setCategory]     = useState("all");
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [cart, setCart]             = useState([]);
  const [cartOpen, setCartOpen]     = useState(false);
  const [order, setOrder]           = useState(null);
  const [form, setForm]             = useState({ name:"", email:"", phone:"", address:"", notes:"" });
  const [errors, setErrors]         = useState({});
  const [submitting, setSubmitting] = useState(false);
  const [toast, setToast]           = useState(null);
  const [heroIn, setHeroIn]         = useState(false);
  const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

  // Load products from JSON files; falls back to embedded data when running locally (file://)
  const EMBEDDED_PRODUCTS = [{"id": 1, "name": "The Midnight Library", "author": "Matt Haig", "price": 349, "image": "images/1.jpg", "desc": "A dazzling novel about all the lives we could have lived.", "badge": "Bestseller", "category": "books", "genre": "Self Help"}, {"id": 2, "name": "Lessons in Chemistry", "author": "Bonnie Garmus", "price": 399, "image": "images/2.jpg", "desc": "A woman chemist in the 1960s becomes an unlikely cooking show host.", "badge": "Staff Pick", "category": "books", "genre": "Romance"}, {"id": 3, "name": "The Atlas Six", "author": "Olivie Blake", "price": 449, "image": "images/3.jpg", "desc": "Dark academia fantasy with six magical scholars and deadly stakes.", "badge": "New Arrival", "category": "books", "genre": "Fantasy"}, {"id": 4, "name": "Tomorrow & Tomorrow", "author": "Gabriel Zevin", "price": 379, "image": "images/4.jpg", "desc": "A sweeping love story set in the world of video games.", "badge": "", "category": "books", "genre": "Romance"}, {"id": 5, "name": "Piranesi", "author": "Susanna Clarke", "price": 299, "image": "images/5.jpg", "desc": "A mysterious man living in a house with infinite halls and tides.", "badge": "Award Winner", "category": "books", "genre": "Mystery"}, {"id": 6, "name": "Sea of Tranquility", "author": "Emily St. John Mandel", "price": 349, "image": "images/6.jpg", "desc": "Time travel across centuries connects five extraordinary lives.", "badge": "", "category": "books", "genre": "Thriller"}, {"id": 7, "name": "Pressed Flower Bookmark", "price": 89, "image": "images/7.jpg", "desc": "Handcrafted with real dried flowers preserved under clear resin.", "badge": "Handmade", "category": "bookmarks", "author": ""}, {"id": 8, "name": "Leather Tassel Bookmark", "price": 129, "image": "images/8.jpg", "desc": "Genuine leather with a gold tassel. Rich aged caramel tone.", "badge": "Bestseller", "category": "bookmarks", "author": ""}, {"id": 9, "name": "Watercolour Set of 3", "price": 149, "image": "images/9.jpg", "desc": "Three bookmarks printed with original watercolour artwork.", "badge": "", "category": "bookmarks", "author": ""}, {"id": 10, "name": "Brass Clip Bookmark", "price": 99, "image": "images/10.jpg", "desc": "Elegant brass page clip with a delicate leaf detail.", "badge": "New", "category": "bookmarks", "author": ""}, {"id": 11, "name": "The Muted Sage Diary", "price": 499, "image": "images/11.jpg", "desc": "A5 dotted journal, 200 cream pages, sage green linen cover.", "badge": "New Arrival", "category": "diaries", "author": ""}, {"id": 12, "name": "Vintage Leather Journal", "price": 699, "image": "images/12.jpg", "desc": "Genuine leather-bound and refillable, with 192 ruled pages.", "badge": "Staff Pick", "category": "diaries", "author": ""}, {"id": 13, "name": "Floral Weekly Planner", "price": 399, "image": "images/13.jpg", "desc": "Undated weekly planner with original botanical illustrations.", "badge": "", "category": "diaries", "author": ""}, {"id": 14, "name": "Moonchild Night Journal", "price": 549, "image": "images/14.jpg", "desc": "Celestial art cover, cream pages, and a satin ribbon marker.", "badge": "Bestseller", "category": "diaries", "author": ""}, {"id": 15, "name": "Bookish Washi Tape Set", "price": 199, "image": "images/15.jpg", "desc": "Set of 5 literary-themed washi tapes for journaling & crafts.", "badge": "", "category": "misc", "author": ""}, {"id": 16, "name": "Reader's Tote Bag", "price": 449, "image": "images/16.jpg", "desc": "Cotton canvas tote with 'One more chapter' screen print.", "badge": "Bestseller", "category": "misc", "author": ""}, {"id": 17, "name": "Book Lovers Candle", "price": 299, "image": "images/17.jpg", "desc": "Soy wax candle scented with old books, vanilla & sandalwood.", "badge": "New", "category": "misc", "author": ""}, {"id": 18, "name": "Quill & Ink Pen Set", "price": 349, "image": "images/18.jpg", "desc": "Dip pen with three nibs and a pot of rich walnut ink.", "badge": "Staff Pick", "category": "misc", "author": ""}, {"id": 19, "name": "The Wanderer's Mystery Box", "price": 999, "image": "images/19.jpg", "desc": "A curated mystery box for the avid reader. Every box is unique \u2014 books, bookmarks, stationery, and surprises!", "badge": "\u2728 Mystery", "category": "mystery", "author": ""}, {"id": 20, "name": "Mini Mystery Parcel", "price": 599, "image": "images/20.jpg", "desc": "A smaller mystery parcel \u2014 perfect as a gift or self-treat. 2\u20133 mystery items curated with love.", "badge": "\u2728 Mystery", "category": "mystery", "author": ""}];

  const EMBEDDED_FAQS = [{"id":1,"category":"Orders & Shipping","question":"How do I place an order?","answer":"Simply browse our shop, add items to your cart, and proceed to checkout. Fill in your name, contact number, and address — we'll confirm your order via a call or email before dispatching."},{"id":2,"category":"Orders & Shipping","question":"How long does delivery take?","answer":"Most orders are dispatched within 2–3 business days. Delivery typically takes 4–7 business days depending on your location. We'll keep you updated every step of the way."},{"id":3,"category":"Orders & Shipping","question":"Do you ship across India?","answer":"Yes! We ship to all major cities and towns across India. If you're unsure whether we deliver to your pin code, just reach out to us and we'll check for you."},{"id":4,"category":"Orders & Shipping","question":"Can I track my order?","answer":"Once your order is dispatched, we'll send you the tracking details via email or WhatsApp. You can use the tracking number on our courier partner's website to follow your package."},{"id":5,"category":"Payments","question":"What payment methods do you accept?","answer":"We accept UPI, bank transfers, and cash on delivery (COD) for most locations. We'll share payment details when we confirm your order."},{"id":6,"category":"Payments","question":"Is it safe to pay online?","answer":"Absolutely. We use standard UPI and bank transfer methods — no card details are ever stored by us. If you have any concerns, you can always opt for cash on delivery."},{"id":7,"category":"Products","question":"Are the bookmarks really handmade?","answer":"Yes! Our handmade bookmarks are crafted with care — from pressed flowers preserved under resin to hand-stamped leather pieces. Each one is unique and made in small batches."},{"id":8,"category":"Products","question":"What's inside the Mystery Box?","answer":"Every Mystery Box is a surprise! It typically includes 1–2 curated books, one or more bookmarks, some stationery, and a little something extra from us. No two boxes are exactly alike."},{"id":9,"category":"Products","question":"Are the books new or used?","answer":"All books sold on Spines & Scribbles are brand new unless explicitly stated otherwise. We source them from reputable publishers and distributors."},{"id":10,"category":"Returns & Exchanges","question":"What if I receive a damaged item?","answer":"We're so sorry if that happens! Please take a photo of the damaged item and email or WhatsApp us within 48 hours of delivery. We'll arrange a replacement or refund promptly."},{"id":11,"category":"Returns & Exchanges","question":"Can I return or exchange a product?","answer":"We accept returns or exchanges within 7 days of delivery for items that are unused and in their original condition. Mystery boxes and personalised items are non-returnable. Reach out to us and we'll sort it out."},{"id":12,"category":"Gifting","question":"Do you offer gift wrapping?","answer":"Yes! All our orders come beautifully packaged by default — wrapped in brown paper with a little note. It's already gift-ready. If you'd like a personalised message included, just mention it in the order notes."},{"id":13,"category":"Gifting","question":"Can I send an order directly to someone as a gift?","answer":"Of course! Just enter the recipient's address at checkout and add a gift message in the notes. We'll make sure it arrives looking lovely."}];[{"id":1,"name":"Priya Sharma","rating":5,"date":"2025-04-12","review":"I ordered the Vintage Leather Journal and it is absolutely gorgeous. The quality is so much better than I expected — the leather feels rich and the pages are thick and smooth. Packaging was also beautifully done, felt like opening a gift. Will definitely be ordering again!","item":"Vintage Leather Journal"},{"id":2,"name":"Arjun Mehta","rating":5,"date":"2025-04-18","review":"Got the Wanderer's Mystery Box as a birthday treat to myself and I was blown away. Two books I hadn't read, a pressed flower bookmark, and some washi tape — such a thoughtful curation. The whole unboxing experience was magical. 10/10.","item":"The Wanderer's Mystery Box"},{"id":3,"name":"Sneha Iyer","rating":5,"date":"2025-05-02","review":"Piranesi arrived so quickly and the packaging was so pretty — wrapped in brown paper with a little note. I've already recommended Spines & Scribbles to all my reader friends. This is exactly the kind of bookshop experience I didn't know I needed online.","item":"Piranesi"},{"id":4,"name":"Rohan Kapoor","rating":4,"date":"2025-05-08","review":"Ordered the Leather Tassel Bookmark and the Quill & Ink Pen Set together. Both arrived in perfect condition. The pen set is stunning and the ink quality is lovely. Really happy with the purchase — the whole shop has such a cosy, personal feel to it.","item":"Quill & Ink Pen Set"},{"id":5,"name":"Ananya Bose","rating":5,"date":"2025-05-15","review":"The Moonchild Night Journal is exactly as described — the cover art is beautiful and the satin ribbon is such a nice touch. I love journaling at night and this feels so fitting. Delivery was smooth and the team was very responsive over email.","item":"Moonchild Night Journal"},{"id":6,"name":"Vikram Nair","rating":5,"date":"2025-05-20","review":"Bought The Midnight Library as a gift for my sister and she absolutely loved it. Came wrapped beautifully. Spines & Scribbles really nails the whole gifting experience — it feels personal and curated, not like any other online store.","item":"The Midnight Library"}];

  useEffect(() => {
    const sources = [
      { file:"books.json",     category:"books"     },
      { file:"bookmarks.json", category:"bookmarks" },
      { file:"diaries.json",   category:"diaries"   },
      { file:"misc.json",      category:"misc"      },
      { file:"mystery.json",   category:"mystery"   },
    ];
    // file:// protocol blocks fetch — detect and use embedded data instead
    if (window.location.protocol === "file:") {
      setProducts(EMBEDDED_PRODUCTS);
      setReviews(EMBEDDED_REVIEWS);
      setFaqs(EMBEDDED_FAQS);
      setLoading(false);
      return;
    }
    const productsPromise = Promise.all(
      sources.map(s =>
        fetch(s.file)
          .then(r => { if (!r.ok) throw new Error(); return r.json(); })
          .then(items => items.map(item => ({ ...item, author: item.author || "", genre: item.genre || "", category: s.category })))
          .catch(() => [])
      )
    );
    const couponsPromise = fetch("coupons.json")
      .then(r => r.json())
      .then(list => Object.fromEntries(list.map(c => [c.code.toLowerCase(), c.discount])))
      .catch(() => ({}));
    const reviewsPromise = fetch("reviews.json")
      .then(r => r.json())
      .catch(() => []);
    const faqsPromise = fetch("faq.json")
      .then(r => r.json())
      .catch(() => []);
    Promise.all([productsPromise, couponsPromise, reviewsPromise, faqsPromise]).then(([results, loadedCoupons, loadedReviews, loadedFaqs]) => {
      const loaded = results.flat();
      setProducts(loaded.length > 0 ? loaded : EMBEDDED_PRODUCTS);
      setCoupons(Object.keys(loadedCoupons).length > 0 ? loadedCoupons : { "bookslover5": 5 });
      setReviews(loadedReviews.length > 0 ? loadedReviews : EMBEDDED_REVIEWS);
      setFaqs(loadedFaqs.length > 0 ? loadedFaqs : EMBEDDED_FAQS);
      setLoading(false);
    });
  }, []);

  useEffect(() => { setTimeout(() => setHeroIn(true), 80); }, []);

  const showToast = msg => { setToast(msg); setTimeout(() => setToast(null), 2600); };

  const addToCart = product => {
    setCart(prev => {
      const ex = prev.find(i => i.id === product.id);
      return ex ? prev.map(i => i.id === product.id ? { ...i, qty: i.qty+1 } : i)
                : [...prev, { ...product, qty:1 }];
    });
    showToast(`${product.name} added to cart`);
  };

  const removeFromCart = id => setCart(prev => prev.filter(i => i.id !== id));
  const updateQty      = (id, d) => setCart(prev =>
    prev.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty+d) } : i)
  );

  const cartTotal = cart.reduce((s, i) => s + i.price * i.qty, 0);
  const cartCount = cart.reduce((s, i) => s + i.qty, 0);
  const filtered  = category === "all" ? products : products.filter(p => p.category === category);

  const validate = () => {
    const e = {};
    if (!form.name.trim())                           e.name    = "Name is required";
    if (!form.email.match(/^[^@]+@[^@]+\.[^@]+$/))  e.email   = "Valid email required";
    if (!form.phone.match(/^\+?[\d\s\-]{7,15}$/))   e.phone   = "Valid phone number required";
    if (!form.address.trim())                        e.address = "Delivery address is required";
    setErrors(e);
    return Object.keys(e).length === 0;
  };

  const handleCheckout = async (finalTotal, appliedCoupon) => {
    if (!validate() || cart.length === 0) return;
    setSubmitting(true);
    const orderId    = "SS" + Date.now().toString().slice(-6);
    const lines      = cart.map(i => `${i.name} x${i.qty}  -  Rs.${(i.price*i.qty).toLocaleString()}`).join("\n");
    const couponLine = appliedCoupon ? `\nCoupon: ${appliedCoupon.code} (${appliedCoupon.discount}% off)\nDiscount: - Rs.${(cartTotal - finalTotal).toLocaleString()}` : "";
    const ownerMsg = `New order!\n\nOrder ID: ${orderId}\nName: ${form.name}\nPhone: ${form.phone}\nEmail: ${form.email}\nAddress: ${form.address}\nNotes: ${form.notes||"-"}\n\nItems:\n${lines}${couponLine}\n\nTotal: Rs.${finalTotal.toLocaleString()}`;
    const custMsg  = `Dear ${form.name},\n\nThank you for your order!\n\nOrder ID: ${orderId}\n\nItems:\n${lines}${couponLine}\n\nTotal: Rs.${finalTotal.toLocaleString()}\n\nWe will contact you on ${form.phone} to confirm and arrange delivery.\n\nWith love,\nSpines and Scribbles`;
    try {
      await emailjs.send("service_knwomjq", "template_rol1gs8", { to_name:"Spines and Scribbles", to_email:OWNER_EMAIL, from_name:form.name, from_email:form.email, reply_to:form.email, subject:`New Order ${orderId} from ${form.name}`, message:ownerMsg });
      await emailjs.send("service_knwomjq", "template_rol1gs8", { to_name:form.name, to_email:form.email, from_name:"Spines and Scribbles", from_email:OWNER_EMAIL, reply_to:OWNER_EMAIL, subject:`Your Order Confirmation - Spines and Scribbles`, message:custMsg });
      setOrder({ id:orderId, name:form.name, total:finalTotal, items:[...cart], coupon:appliedCoupon });
      setCart([]);
      setForm({ name:"", email:"", phone:"", address:"", notes:"" });
      navTo("confirmation");
    } catch(err) {
      console.error("EmailJS error:", err);
      alert("Something went wrong. Please try again or contact us at " + OWNER_EMAIL);
    } finally {
      setSubmitting(false);
    }
  };

  const navTo = (p, product) => { setPage(p); if (product) setSelectedProduct(product); setMobileMenuOpen(false); window.scrollTo(0,0); };

  if (loading) return (
    <div style={{minHeight:"100vh", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", background:"#fdf6ee"}}>
      <div style={{fontFamily:"'Playfair Display',serif", fontSize:28, marginBottom:24}}>📚 Spines &amp; Scribbles</div>
      <div className="spinner" />
    </div>
  );

  return (
    <div>
      {/* NAV */}
      <nav style={{background:"#f5e6d0", borderBottom:"1px solid #e0c9a8", padding:"0 20px 0 16px", display:"flex", alignItems:"center", justifyContent:"space-between", height:60, position:"sticky", top:0, zIndex:50}}>
        <div style={{display:"flex", alignItems:"center", gap:8, cursor:"pointer", flexShrink:0}} onClick={() => navTo("home")}>
          <span style={{fontSize:20}}>📚</span>
          <span style={{fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:800, color:"#3d2b1f", letterSpacing:"-0.02em", lineHeight:1.1}}>Spines &amp; Scribbles</span>
        </div>
        {/* Desktop links */}
        <div className="nav-links" style={{display:"flex", alignItems:"center", gap:4}}>
          <button className="nav-link" onClick={() => navTo("home")}>Home</button>
          <button className="nav-link" onClick={() => { setCategory("all"); navTo("shop"); }}>Shop</button>
          <button className="nav-link" onClick={() => navTo("mystery")}>Mystery Box</button>
          <button className="nav-link" onClick={() => navTo("reviews")}>Reviews</button>
          <button className="nav-link" onClick={() => navTo("faq")}>FAQs</button>
          <button className="btn-ghost" style={{marginLeft:8, position:"relative"}} onClick={() => setCartOpen(true)}>
            Cart
            {cartCount > 0 && <span style={{position:"absolute", top:-6, right:-6, background:"#7c4e2a", color:"#fff", borderRadius:"50%", fontSize:11, padding:"2px 6px", lineHeight:1}}>{cartCount}</span>}
          </button>
        </div>
        {/* Mobile right: cart icon + hamburger — always side by side in a flex row */}
        <div className="nav-hamburger" style={{display:"none", flexDirection:"row", alignItems:"center", gap:2}}>
          <button style={{background:"none", border:"none", cursor:"pointer", padding:"8px 10px", position:"relative", fontSize:19, lineHeight:1, display:"flex", alignItems:"center"}} onClick={() => setCartOpen(true)} aria-label="Cart">
            🛒
            {cartCount > 0 && <span style={{position:"absolute", top:4, right:4, background:"#7c4e2a", color:"#fff", borderRadius:"50%", fontSize:9, padding:"1px 4px", lineHeight:1.4, minWidth:16, textAlign:"center"}}>{cartCount}</span>}
          </button>
          <button onClick={() => setMobileMenuOpen(true)} aria-label="Open menu" style={{background:"none", border:"none", cursor:"pointer", padding:"8px 10px", display:"flex", flexDirection:"column", gap:5, alignItems:"center", justifyContent:"center"}}>
            <span style={{display:"block", width:22, height:2, background:"#7c4e2a", borderRadius:2}} />
            <span style={{display:"block", width:22, height:2, background:"#7c4e2a", borderRadius:2}} />
            <span style={{display:"block", width:22, height:2, background:"#7c4e2a", borderRadius:2}} />
          </button>
        </div>
      </nav>

      {/* Mobile slide-out menu */}
      {mobileMenuOpen && (
        <>
          <div className="mobile-menu" onClick={() => setMobileMenuOpen(false)} />
          <div className="mobile-menu-panel">
            <div style={{display:"flex", justifyContent:"space-between", alignItems:"center", padding:"0 24px 20px", borderBottom:"1px solid #e0c9a8", marginBottom:8}}>
              <span style={{fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:800, color:"#3d2b1f"}}>Menu</span>
              <button style={{background:"none", border:"none", fontSize:20, cursor:"pointer", color:"#7c4e2a", lineHeight:1}} onClick={() => setMobileMenuOpen(false)}>✕</button>
            </div>
            <button className="mobile-nav-link" onClick={() => navTo("home")}>🏠 Home</button>
            <button className="mobile-nav-link" onClick={() => { setCategory("all"); navTo("shop"); }}>📚 Shop</button>
            <button className="mobile-nav-link" onClick={() => navTo("mystery")}>✨ Mystery Box</button>

              🛒 Cart {cartCount > 0 && <span style={{background:"#7c4e2a", color:"#fff", borderRadius:10, fontSize:11, padding:"1px 7px", marginLeft:6}}>{cartCount}</span>}
            </button>
          </div>
        </>
      )}

      {/* PAGES */}
      {page === "home"         && <HomePage         products={products} reviews={reviews} setPage={navTo} heroIn={heroIn} addToCart={addToCart} setCategory={setCategory} />}
      {page === "shop"         && <ShopPage         filtered={filtered} category={category} setCategory={setCategory} addToCart={addToCart} setPage={navTo} products={products} />}
      {page === "mystery"      && <MysteryPage      products={products} addToCart={addToCart} setPage={navTo} />}
      {page === "reviews"      && <ReviewsPage      reviews={reviews} setPage={navTo} />}
      {page === "faq"          && <FAQPage          faqs={faqs} setPage={navTo} />}
      {page === "product"      && <ProductDetailPage product={selectedProduct} products={products} reviews={reviews} addToCart={addToCart} setPage={navTo} setCategory={setCategory} />}
      {page === "cart"         && <CartPage         cart={cart} cartTotal={cartTotal} updateQty={updateQty} removeFromCart={removeFromCart} setPage={navTo} form={form} setForm={setForm} handleCheckout={handleCheckout} submitting={submitting} errors={errors} coupons={coupons} />}
      {page === "confirmation" && <ConfirmationPage order={order} setPage={navTo} />}

      {/* CART SIDEBAR */}

          <div className="overlay" onClick={() => setCartOpen(false)} />

                      <button onClick={() => updateQty(item.id,-1)} style={{background:"#f0dfc8", border:"none", borderRadius:"50%", width:26, height:26, cursor:"pointer", fontSize:15, lineHeight:1}}>-</button>

              </div>

      )}

      {toast && <div className="toast">{toast}</div>}

      {/* FOOTER */}
      <footer style={{background:"#3d2b1f", color:"#d4b896", padding:"44px clamp(16px,5vw,48px) 24px", marginTop:80}}>

// ── REVIEW CARD ───────────────────────────────────────────
function ReviewCard({ review }) {
  const stars = "★".repeat(review.rating) + "☆".repeat(5 - review.rating);
  const dateStr = new Date(review.date).toLocaleDateString("en-IN", { day:"numeric", month:"long", year:"numeric" });
  return (
    <div className="review-card">
      <div style={{display:"flex", alignItems:"flex-start", justifyContent:"space-between", gap:8}}>
        <div>
          <p style={{fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, marginBottom:2}}>{review.name}</p>
          <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#9a6e4c"}}>{dateStr}</p>
        </div>
        <span className="stars">{stars}</span>
      </div>
      {review.item && (
        <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#7c4e2a", background:"#f5e6d0", borderRadius:20, padding:"3px 12px", alignSelf:"flex-start"}}>
          📦 {review.item}
        </p>
      )}

// ── SHOP ──────────────────────────────────────────────────
function ShopPage({ filtered, category, setCategory, addToCart, setPage, products }) {
  const [search, setSearch]       = React.useState("");
  const [activeGenre, setActiveGenre] = React.useState("all");

  // Reset genre filter whenever the category changes
  React.useEffect(() => { setActiveGenre("all"); }, [category]);

  // Derive unique genres dynamically from all books in the products list
  const bookGenres = React.useMemo(() => {
    const genres = products
      .filter(p => p.category === "books" && p.genre)
      .map(p => p.genre);
    return [...new Set(genres)].sort();
  }, [products]);

  const showGenreFilter = category === "books" || category === "all";

  // Apply genre filter on top of the already category-filtered list
  const genreFiltered = (activeGenre === "all" || !showGenreFilter)
    ? filtered
    : filtered.filter(p => p.category !== "books" || p.genre === activeGenre);

  const searchFiltered = search.trim()
    ? genreFiltered.filter(p => p.name.toLowerCase().includes(search.toLowerCase()))
    : genreFiltered;

  return (
    <div className="section-pad" style={{padding:"48px clamp(16px,5vw,48px) 0", maxWidth:1200, margin:"0 auto"}}>
      <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, letterSpacing:"0.15em", color:"#9a6e4c", textTransform:"uppercase", marginBottom:8}}>Everything we love</p>
      <h2 className="section-title">Our Collection</h2>
      <div className="divider" />
      <div style={{display:"flex", gap:8, flexWrap:"wrap", marginBottom:16}}>
        {CATEGORIES.map(c => (
          <button key={c.key} className={`cat-pill ${category===c.key?"active":""}`}
            onClick={() => { if (c.key === "mystery") { setPage("mystery"); } else { setCategory(c.key); } }}>
            {c.label}
          </button>
        ))}
      </div>

      {/* Genre filter — only visible when Books (or All) is active and genres exist */}
      {showGenreFilter && bookGenres.length > 0 && (
        <div style={{marginBottom:20}}>
          <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, letterSpacing:"0.12em", color:"#9a6e4c", textTransform:"uppercase", marginBottom:10}}>
            📖 Filter by Genre
          </p>
          <div style={{display:"flex", gap:8, flexWrap:"wrap"}}>
            <button
              className={`cat-pill ${activeGenre === "all" ? "active" : ""}`}
              style={{fontSize:12, padding:"6px 16px"}}
              onClick={() => setActiveGenre("all")}>
              All Genres
            </button>
            {bookGenres.map(genre => (
              <button
                key={genre}
                className={`cat-pill ${activeGenre === genre ? "active" : ""}`}
                style={{fontSize:12, padding:"6px 16px"}}
                onClick={() => setActiveGenre(genre)}>
                {genre}
              </button>
            ))}
          </div>
        </div>
      )}

      <div style={{position:"relative", marginBottom:28}}>
        <span style={{position:"absolute", left:14, top:"50%", transform:"translateY(-50%)", fontSize:16, color:"#b08060"}}>🔍</span>
        <input
          type="text"
          className="input-field"
          placeholder="Search products..."
          value={search}
          onChange={e => setSearch(e.target.value)}
          style={{paddingLeft:40}}
        />
        {search && <button onClick={() => setSearch("")} style={{position:"absolute", right:14, top:"50%", transform:"translateY(-50%)", background:"none", border:"none", fontSize:16, cursor:"pointer", color:"#b08060"}}>✕</button>}
      </div>
      <div className="grid-3">
        {searchFiltered.length > 0
          ? searchFiltered.map(p => <ProductCard key={p.id} product={p} addToCart={addToCart} setPage={setPage} />)
          : <p style={{fontFamily:"'DM Sans',sans-serif", color:"#9a6e4c", padding:"40px 0"}}>No products found{search ? ` for "${search}"` : ""}</p>
        }
      </div>
    </div>
  );
}

                  onClick={() => setQty(q => q+1)}
                  style={{background:"none", border:"none", width:40, height:44, cursor:"pointer", fontSize:18, color:"#7c4e2a", fontWeight:700}}
                >+</button>
              </div>
              <button
                className="btn-primary"
                onClick={handleAdd}
                style={{flex:1, minWidth:160, fontSize:15, padding:"12px 28px", transition:"all 0.18s", background: addedAnim ? "#3e6b3e" : "#7c4e2a"}}
              >
                {addedAnim ? "✓ Added to Cart!" : "Add to Cart"}
              </button>
            </div>

            {/* Trust badges */}
            <div style={{display:"flex", gap:16, flexWrap:"wrap", marginBottom:28}}>
              {[["🎁","Gift wrapping included"],["📦","Careful packaging"],["📧","Order confirmed by email"]].map(([e,t]) => (
                <div key={t} style={{display:"flex", alignItems:"center", gap:6, fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#6b4a2e", background:"#f5e6d0", borderRadius:20, padding:"5px 12px"}}>
                  <span>{e}</span><span>{t}</span>
                </div>
              ))}
            </div>

            {/* Details table */}
            <div style={{background:"#fffaf4", borderRadius:14, border:"1px solid #e0c9a8", padding:"8px 20px", marginBottom:0}}>
              {detailRows.map(row => (
                <div key={row.label} className="pdp-detail-row">
                  <span style={{color:"#9a6e4c", fontWeight:500}}>{row.label}</span>
                  <span style={{color:"#3d2b1f", fontWeight:500, textAlign:"right"}}>{row.value}</span>
                </div>
              ))}
            </div>
          </div>
        </div>

        {/* ── Reviews for this product ── */}
        {productReviews.length > 0 && (
          <div style={{marginTop:64}}>
            <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, letterSpacing:"0.15em", color:"#9a6e4c", textTransform:"uppercase", marginBottom:8}}>What readers say</p>
            <h2 className="section-title">Reviews for this item</h2>
            <div className="divider"/>
            <div className="grid-reviews">
              {productReviews.map(r => <ReviewCard key={r.id} review={r} />)}
            </div>
            <div style={{textAlign:"center", marginTop:28}}>
              <button className="btn-ghost" style={{fontSize:13}} onClick={() => setPage("reviews")}>See all reviews →</button>
            </div>
          </div>
        )}

        {/* ── Related products ── */}
        {related.length > 0 && (
          <div style={{marginTop:64}}>
            <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, letterSpacing:"0.15em", color:"#9a6e4c", textTransform:"uppercase", marginBottom:8}}>You might also like</p>
            <h2 className="section-title">More from {catLabel}</h2>
            <div className="divider"/>
            <div className="grid-3">
              {related.map(p => <ProductCard key={p.id} product={p} addToCart={addToCart} setPage={setPage} />)}
            </div>
            <div style={{textAlign:"center", marginTop:32}}>
              <button className="btn-ghost" onClick={() => { setCategory(product.category); setPage("shop"); }}>
                Browse all {catLabel} →
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── CHECKOUT ──────────────────────────────────────────────
function CartPage({ cart, cartTotal, updateQty, removeFromCart, setPage, form, setForm, handleCheckout, submitting, errors, coupons }) {
  const [couponInput, setCouponInput] = React.useState("");
  const [appliedCoupon, setAppliedCoupon] = React.useState(null);
  const [couponError, setCouponError] = React.useState("");

  const applyCoupon = () => {
    const code = couponInput.trim().toLowerCase();
    if (coupons[code] !== undefined) {
      setAppliedCoupon({ code: couponInput.trim(), discount: coupons[code] });
      setCouponError("");
    } else {
      setAppliedCoupon(null);
      setCouponError("Invalid coupon code. Please try again.");
    }
  };

  const removeCoupon = () => {
    setAppliedCoupon(null);
    setCouponInput("");
    setCouponError("");
  };

  const discount    = appliedCoupon ? Math.round(cartTotal * appliedCoupon.discount / 100) : 0;
  const finalTotal  = cartTotal - discount;

  const field = (label, key, type="text", ph="") => (
    <div style={{marginBottom:18}}>
      <label style={{display:"block", fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#6b4a2e", marginBottom:6, fontWeight:500}}>{label}</label>
      {key === "notes"
        ? <textarea className={`input-field${errors[key]?" err":""}`} rows={3} placeholder={ph} value={form[key]} onChange={e => setForm(p => ({...p,[key]:e.target.value}))} style={{resize:"vertical"}} />
        : <input type={type} className={`input-field${errors[key]?" err":""}`} placeholder={ph} value={form[key]} onChange={e => setForm(p => ({...p,[key]:e.target.value}))} />
      }
      {errors[key] && <p style={{color:"#c0392b", fontSize:12, marginTop:4, fontFamily:"'DM Sans',sans-serif"}}>{errors[key]}</p>}
    </div>
  );
  if (cart.length === 0) return (
    <div style={{textAlign:"center", padding:"100px clamp(16px,5vw,48px)"}}>
      <div style={{fontSize:60, marginBottom:16}}>🛒</div>
      <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:28, marginBottom:12}}>Your cart is empty</h2>
      <button className="btn-primary" onClick={() => setPage("shop")}>Browse the Shop</button>
    </div>
  );
  return (
    <div className="section-pad" style={{padding:"48px clamp(16px,5vw,48px) 0", maxWidth:1000, margin:"0 auto"}}>
      <h2 className="section-title">Checkout</h2>
      <div className="divider" />
      <div className="checkout-grid" style={{display:"grid", gridTemplateColumns:"1fr 380px", gap:36}}>
        <div>
          <h3 style={{fontFamily:"'Playfair Display',serif", fontSize:20, marginBottom:16}}>Your Order</h3>
          {cart.map(item => (
            <div key={item.id} style={{display:"flex", gap:14, padding:"14px 0", borderBottom:"1px solid #f0dfc8", alignItems:"center"}}>
              <div style={{width:52, height:68, borderRadius:8, overflow:"hidden", flexShrink:0}}>
                <ProductImage src={item.image} alt={item.name} />
              </div>
              <div style={{flex:1}}>
                <p style={{fontSize:15, fontWeight:600}}>{item.name}</p>
                <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#9a6e4c"}}>Rs.{item.price.toLocaleString()} each</p>
              </div>
              <div style={{display:"flex", alignItems:"center", gap:8}}>
                <button onClick={() => updateQty(item.id,-1)} style={{background:"#f0dfc8", border:"none", borderRadius:"50%", width:28, height:28, cursor:"pointer", fontSize:14}}>-</button>
                <span style={{fontFamily:"'DM Sans',sans-serif", minWidth:20, textAlign:"center"}}>{item.qty}</span>
                <button onClick={() => updateQty(item.id,1)}  style={{background:"#f0dfc8", border:"none", borderRadius:"50%", width:28, height:28, cursor:"pointer", fontSize:14}}>+</button>
                <button onClick={() => removeFromCart(item.id)} style={{marginLeft:4, background:"none", border:"none", color:"#c0392b", cursor:"pointer", fontSize:12, fontFamily:"'DM Sans',sans-serif"}}>x</button>
              </div>
              <div style={{fontFamily:"'Playfair Display',serif", fontSize:16, minWidth:70, textAlign:"right", color:"#7c4e2a"}}>Rs.{(item.price*item.qty).toLocaleString()}</div>
            </div>
          ))}
          <div style={{borderTop:"1px solid #f0dfc8", paddingTop:16, marginTop:4}}>
            <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'Playfair Display',serif", fontSize:17, marginBottom:6}}>
              <span>Subtotal</span><span>Rs.{cartTotal.toLocaleString()}</span>
            </div>
            {appliedCoupon && (
              <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'DM Sans',sans-serif", fontSize:14, color:"#3e7c3e", marginBottom:6}}>
                <span>Discount ({appliedCoupon.discount}% off — {appliedCoupon.code})</span>
                <span>- Rs.{discount.toLocaleString()}</span>
              </div>
            )}
            <div style={{display:"flex", justifyContent:"space-between", fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:700, marginTop:8}}>
              <span>Total</span><span style={{color:"#7c4e2a"}}>Rs.{finalTotal.toLocaleString()}</span>
            </div>
          </div>

          {/* Coupon Section */}
          <div style={{marginTop:20, background:"#f5e6d0", borderRadius:12, padding:"16px"}}>
            <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:13, fontWeight:500, color:"#6b4a2e", marginBottom:10}}>🎟️ Have a coupon code?</p>
            {appliedCoupon ? (
              <div style={{display:"flex", alignItems:"center", justifyContent:"space-between", background:"#e8f5e8", borderRadius:8, padding:"10px 14px"}}>
                <span style={{fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#3e7c3e", fontWeight:500}}>✓ "{appliedCoupon.code}" applied — {appliedCoupon.discount}% off!</span>
                <button onClick={removeCoupon} style={{background:"none", border:"none", color:"#c0392b", cursor:"pointer", fontSize:12, fontFamily:"'DM Sans',sans-serif"}}>Remove</button>
              </div>
            ) : (
              <div style={{display:"flex", gap:8}}>
                <input
                  type="text"
                  className="input-field"
                  placeholder="Enter coupon code"
                  value={couponInput}
                  onChange={e => { setCouponInput(e.target.value); setCouponError(""); }}
                  onKeyDown={e => e.key === "Enter" && applyCoupon()}
                  style={{flex:1, fontSize:14, padding:"10px 14px"}}
                />
                <button className="btn-primary" style={{padding:"10px 18px", fontSize:13, borderRadius:10, whiteSpace:"nowrap"}} onClick={applyCoupon}>Apply</button>
              </div>
            )}
            {couponError && <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#c0392b", marginTop:6}}>{couponError}</p>}
          </div>

          <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#9a6e4c", marginTop:12}}>We'll contact you to confirm your order and arrange delivery.</p>
        </div>
        <div style={{background:"#fffaf4", borderRadius:16, border:"1px solid #e0c9a8", padding:"28px 24px", alignSelf:"start"}}>
          <h3 style={{fontFamily:"'Playfair Display',serif", fontSize:20, marginBottom:20}}>Your Details</h3>
          {field("Full Name *",             "name",    "text",  "Jane Austen")}
          {field("Email Address *",         "email",   "email", "you@email.com")}
          {field("Phone Number *",          "phone",   "tel",   "+91 98765 43210")}
          {field("Delivery Address *",      "address", "text",  "House no., street, city, pincode")}
          {field("Notes / Special Requests","notes",   "text",  "e.g. Gift wrap, anything else...")}
          <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#9a6e4c", marginBottom:20, lineHeight:1.6}}>Order details will be sent to your email. We'll reach out to confirm.</p>
          <button className="btn-primary" style={{width:"100%", fontSize:16, padding:14}} onClick={() => handleCheckout(finalTotal, appliedCoupon)} disabled={submitting}>
            {submitting ? "Placing Order..." : "Place Order"}
          </button>
        </div>
      </div>
    </div>
  );
}

// ── CONFIRMATION ──────────────────────────────────────────
function ConfirmationPage({ order, setPage }) {
  if (!order) return null;
  return (
    <div style={{textAlign:"center", padding:"80px clamp(16px,5vw,48px)", maxWidth:600, margin:"0 auto"}}>
      <div style={{fontSize:68, marginBottom:20}}>🌿</div>
      <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:36, fontWeight:800, marginBottom:8}}>Order Placed!</h2>
      <p style={{fontFamily:"'DM Sans',sans-serif", color:"#9a6e4c", marginBottom:8}}>Order ID: <strong style={{color:"#7c4e2a"}}>{order.id}</strong></p>
      <p style={{fontSize:17, color:"#6b4a2e", lineHeight:1.7, marginBottom:8}}>Thank you, <strong>{order.name}</strong>! Your order worth <strong>Rs.{order.total.toLocaleString()}</strong> has been placed.</p>
      <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:14, color:"#9a6e4c", marginBottom:8}}>A confirmation email has been sent to you, and we've been notified too.</p>
      <div style={{background:"#f5e6d0", borderRadius:14, padding:"20px", margin:"24px 0", textAlign:"left"}}>
        {order.items.map(i => (
          <div key={i.id} style={{display:"flex", justifyContent:"space-between", padding:"6px 0", borderBottom:"1px solid #e0c9a8", fontFamily:"'DM Sans',sans-serif", fontSize:14}}>
            <span>{i.name} x{i.qty}</span>
            <span style={{color:"#7c4e2a"}}>Rs.{(i.price*i.qty).toLocaleString()}</span>
          </div>
        ))}
        <div style={{display:"flex", justifyContent:"space-between", paddingTop:10, fontFamily:"'Playfair Display',serif", fontWeight:700, fontSize:16}}>
          <span>Total</span><span style={{color:"#7c4e2a"}}>Rs.{order.total.toLocaleString()}</span>
        </div>
      </div>
      <p style={{fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#9a6e4c", marginBottom:32}}>We'll contact you shortly to confirm and arrange delivery. Happy reading!</p>
      <button className="btn-primary" onClick={() => setPage("home")}>Back to Home</button>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
